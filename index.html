<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;text-size-adjust:100%;overflow-x:hidden}
:root{
  --c-bg:#FAF8F4;--c-dark:#1C1410;--c-espresso:#2E1B0E;
  --c-gold:#B8935A;--c-muted:#8A7560;--c-border:#DDD5C4;--c-surface:#F3EEE5;
  --ice-bg:#F0F6FA;--ice-dark:#0A2333;--ice-mid:#1566A0;
  --ice-accent:#1A8FC4;--ice-muted:#4E7E99;--ice-border:#B0D4E8;--ice-surface:#E2F0F8;
  --tea-bg:#F2F7EF;--tea-dark:#142214;--tea-mid:#2A6832;
  --tea-accent:#3D9147;--tea-muted:#537A59;--tea-border:#B0D4B5;--tea-surface:#E0EFE2;
  --shop-bg:#FBF6EE;--shop-dark:#2C1A06;--shop-mid:#A0621A;
  --shop-accent:#C8841E;--shop-muted:#9A7A50;--shop-border:#E8CFA0;--shop-surface:#F3E4C4;
  --pizza-bg:#161210;--pizza-red:#B83A22;--pizza-gold:#C8A050;--pizza-deep:#1C1208;
  /* Varsayılan tema (coffee) */
  --th-accent:var(--c-gold);--th-accent-rgb:184,147,90;
  --th-muted:var(--c-muted);--th-dark:var(--c-dark);
  --th-border:var(--c-border);--th-surface:var(--c-surface);
  --th-bg:var(--c-bg);--th-mid:var(--c-espresso);
  /* Tema alpha değişkenleri — her tema override edebilir */
  --th-hover-alpha:.14;
  --th-shadow-alpha-lg:.13;--th-shadow-alpha-sm:.08;
  --th-row-open-hi:.09;--th-row-open-lo:.04;
  --th-row-border-alpha:.15;
  --th-rinfo-bg-alpha:.07;
}
body{--th-accent:var(--c-gold);--th-muted:var(--c-muted);--th-dark:var(--c-espresso);--th-border:var(--c-border);--th-surface:var(--c-surface);--th-accent-rgb:184,147,90;--th-bg:var(--c-bg);--th-mid:var(--c-espresso)}
body.ice{--th-accent:var(--ice-accent);--th-muted:var(--ice-muted);--th-dark:var(--ice-dark);--th-border:var(--ice-border);--th-surface:var(--ice-surface);--th-accent-rgb:26,143,196;--th-bg:var(--ice-bg);--th-mid:var(--ice-mid);--th-hover-alpha:.11;--th-shadow-alpha-lg:.13;--th-shadow-alpha-sm:.08;--th-row-open-hi:.09;--th-row-open-lo:.04;--th-row-border-alpha:.15;--th-rinfo-bg-alpha:.07}
body.tea{--th-accent:var(--tea-accent);--th-muted:var(--tea-muted);--th-dark:var(--tea-dark);--th-border:var(--tea-border);--th-surface:var(--tea-surface);--th-accent-rgb:61,145,71;--th-bg:var(--tea-bg);--th-mid:var(--tea-mid);--th-hover-alpha:.10;--th-shadow-alpha-lg:.13;--th-shadow-alpha-sm:.08;--th-row-open-hi:.09;--th-row-open-lo:.04;--th-row-border-alpha:.15;--th-rinfo-bg-alpha:.07}
body.shop{--th-accent:var(--shop-accent);--th-muted:var(--shop-muted);--th-dark:var(--shop-dark);--th-border:var(--shop-border);--th-surface:var(--shop-surface);--th-accent-rgb:200,132,30;--th-bg:var(--shop-bg);--th-mid:var(--shop-mid);--th-hover-alpha:.12;--th-shadow-alpha-lg:.13;--th-shadow-alpha-sm:.08;--th-row-open-hi:.09;--th-row-open-lo:.04;--th-row-border-alpha:.15;--th-rinfo-bg-alpha:.07}
body.pizza{--th-accent:var(--pizza-gold);--th-muted:#7A6A58;--th-dark:#EDE5D8;--th-border:#3A2E24;--th-surface:#1C1410;--th-accent-rgb:200,160,80;--th-bg:var(--pizza-bg);--th-mid:var(--pizza-red);--th-hover-alpha:.07;--th-shadow-alpha-lg:.10;--th-shadow-alpha-sm:.06;--th-row-open-hi:.06;--th-row-open-lo:.02;--th-row-border-alpha:.12;--th-rinfo-bg-alpha:.05}

body{font-family:'Outfit',sans-serif;background:var(--c-bg);color:var(--c-dark);min-height:100vh;transition:background .5s,color .5s}
body.ice{background:var(--ice-bg);color:var(--ice-dark)}
body.tea{background:var(--tea-bg);color:var(--tea-dark)}
body.shop{background:var(--shop-bg);color:var(--shop-dark)}
body.pizza{background:var(--pizza-bg);color:#EDE5D8}

.hero{text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--th-accent),transparent);transition:background .6s}
.hero-ornament{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
.hero-ornament-line{width:28px;height:1px;background:var(--th-accent);opacity:.45;transition:background .5s}
.hero-ornament-dot{width:4px;height:4px;border-radius:50%;background:var(--th-accent);transition:background .5s}
.eyebrow{font-size:9px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--th-accent);margin-bottom:12px;transition:color .5s}
.hero-title{font-family:'Cormorant Garamond',serif;font-weight:300;line-height:.85;letter-spacing:-2px;color:var(--th-dark);transition:color .5s}
.hero-title em{font-style:italic;font-weight:300;color:var(--th-accent);transition:color .5s}
.hero-sub{font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--th-muted);transition:color .5s}

.nav-group{display:flex;flex-direction:column;align-items:center}
.nav-row{display:flex;justify-content:center}
.nav{display:inline-flex;gap:2px;border-radius:10px;padding:4px;background:var(--th-surface);border:1px solid var(--th-border);transition:background .5s,border-color .5s}
body.pizza .nav{background:rgba(42,31,24,.75)}
.food-sep{display:flex;align-items:center;gap:12px;width:100%}
.food-sep-line{flex:1;height:1px;background:var(--th-border);transition:background .5s}
.food-sep-label{font-size:8px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--th-muted);white-space:nowrap;transition:color .5s}
.nb{font-family:'Outfit',sans-serif;font-weight:500;letter-spacing:1px;text-transform:uppercase;border:none;background:none;border-radius:7px;color:var(--th-muted);cursor:pointer;-webkit-appearance:none;appearance:none;transition:background .25s,color .25s;white-space:nowrap;min-height:44px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.nb.on[data-group="main"]{background:var(--th-mid);color:var(--th-bg);font-weight:600}
.nb.on[data-group="pizza"]{
  background:#1A1208;
  color:var(--pizza-gold);
  font-weight:700;
  font-size:12px;
  box-shadow:0 0 14px rgba(var(--th-accent-rgb),.3);
  text-shadow:0 0 10px rgba(var(--th-accent-rgb),.5);
  letter-spacing:1.5px;
}
.nb:not(.on)[data-group="pizza"]{
  color:#C8A050;
  opacity:.85;
  font-weight:500;
}
.nb:not(.on):hover{opacity:.75}
.nb:active{opacity:.75}
.row:active{background:rgba(var(--th-accent-rgb),.1)}
@media(hover:none){.row:hover{background:unset}}

.pizza-cta-wrap{width:100%}
.pizza-nav-box{
  display:flex;
  background:var(--th-surface);border:1px solid var(--th-border);
  border-radius:10px;padding:4px;width:100%;
  transition:background .5s,border-color .5s;
}
body.pizza .pizza-nav-box{background:rgba(42,31,24,.75)}
.pizza-cta{
  display:flex;align-items:center;
  width:100%;min-height:44px;
  border-radius:7px;border:none;
  cursor:pointer;touch-action:manipulation;
  background:none;
  position:relative;overflow:hidden;
  transition:background .25s,color .25s;
  -webkit-appearance:none;appearance:none;
  user-select:none;-webkit-user-select:none;
  padding:0;
}
.pizza-cta-inner{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:0 36px;position:relative;
}
.pizza-cta-text{display:flex;flex-direction:column;gap:3px;align-items:center}
.pizza-cta-title{
  font-family:'Outfit',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:1px;text-transform:uppercase;line-height:1;color:var(--th-muted);
  transition:color .25s;
}
.pizza-cta-title em{font-style:normal;color:inherit;font-weight:500}
.pizza-cta-sub{display:none}
.pizza-cta-chevron{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:18px;color:var(--th-muted);opacity:.35;
  transition:opacity .25s,transform .3s cubic-bezier(.34,1.56,.64,1);
  line-height:1;
}
.pizza-cta:hover{background:rgba(0,0,0,.04)}
body.pizza .pizza-cta:hover{background:rgba(255,255,255,.04)}
.pizza-cta:hover .pizza-cta-chevron{opacity:.7;transform:translateY(-50%) translateX(3px)}
.pizza-cta:active{background:rgba(0,0,0,.07)}
.pizza-cta.on{
  background:var(--th-bg);
  box-shadow:0 1px 4px rgba(0,0,0,.1),0 0 0 .5px rgba(0,0,0,.06);
}
body.pizza .pizza-cta.on{
  background:#1A1208;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.pizza-cta.on .pizza-cta-title{color:var(--th-dark);font-weight:600}
.pizza-cta.on .pizza-cta-chevron{opacity:.6;transform:translateY(-50%) rotate(90deg)}
@media(max-width:639px){
  .pizza-cta{min-height:44px}
  .pizza-cta-inner{padding:0 32px}
}
@media(min-width:640px){
  .pizza-cta{min-height:46px}
}

.extras-wrap{transition:opacity .3s}
.extras{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px}
.extras-label{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--th-muted)}
.extras-sep-dot{color:var(--c-border);font-size:12px}
.extra-pill{font-size:11px;font-weight:500;border:1px solid var(--th-border);border-radius:20px;color:var(--th-dark);background:var(--th-surface);white-space:nowrap;transition:all .4s;display:flex;align-items:center;gap:4px}
body.pizza .extra-pill{border-color:#3A2E24;color:#CFC0A8;background:#2A1F18}
.extra-price{font-weight:600;color:var(--th-accent)}

.dl{display:flex;align-items:center;gap:12px}
.dl-text{font-size:8px;font-weight:600;letter-spacing:3.5px;text-transform:uppercase;color:var(--th-accent);transition:color .5s}
.dl::before,.dl::after{content:'';flex:1;height:1px;background:var(--th-border);transition:background .5s}

.row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:1px solid var(--th-border);padding-left:12px;padding-right:12px;transition:background .25s;position:relative;overflow:hidden}
.row::before{
  content:'';position:absolute;left:0;top:50%;bottom:50%;
  width:3px;
  background:linear-gradient(to bottom,transparent,var(--th-accent),transparent);
  border-radius:0 3px 3px 0;
  transition:top .4s cubic-bezier(0.25,0.46,0.45,0.94),
             bottom .4s cubic-bezier(0.25,0.46,0.45,0.94),
             opacity .3s ease;
  opacity:0;
}
.row:hover::before{top:10%;bottom:10%;opacity:1}
.row-left{flex:1;min-width:0;transition:transform .35s cubic-bezier(0.25,0.46,0.45,0.94)}
.row:hover .row-left{transform:translateX(5px)}
.rw.open .row .row-left,.row.no-slide .row-left{transform:none;transition:none}
.row:hover .rname{color:var(--th-accent);text-shadow:0 0 20px rgba(var(--th-accent-rgb),.65)}
.row:hover .pv{text-shadow:0 0 18px rgba(var(--th-accent-rgb),.9),0 0 36px rgba(var(--th-accent-rgb),.45)}
.row:hover .rchev{color:var(--th-accent);text-shadow:0 0 12px rgba(var(--th-accent-rgb),.7)}
.row:hover{background:rgba(var(--th-accent-rgb),var(--th-hover-alpha))}
.rw .row{cursor:pointer}
@keyframes rw-card-in{
  from{opacity:.6;transform:translateY(-4px)}
  to{opacity:1;transform:translateY(0)}
}
.rw.open{
  border-radius:14px;
  box-shadow:0 8px 32px rgba(var(--th-accent-rgb),var(--th-shadow-alpha-lg)),0 2px 8px rgba(var(--th-accent-rgb),var(--th-shadow-alpha-sm));
  animation:rw-card-in .35s cubic-bezier(0.25,0.46,0.45,0.94) both;
  margin-bottom:4px;
  position:relative;
}
.rw.open::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--th-accent);border-radius:3px 0 0 3px;
  box-shadow:0 0 10px rgba(var(--th-accent-rgb),.38);
  z-index:2;
}
/* rw.open::before — var(--th-accent) ve rgba(var(--th-accent-rgb),.38) base kuralda */
.rw.open::after{
  content:'';position:absolute;top:0;left:3px;right:0;height:1px;
  background:linear-gradient(90deg,var(--th-accent),transparent 70%);
  opacity:.35;border-radius:0 3px 0 0;z-index:2;
}
/* rw.open::after — var(--th-accent) base kuralda */
.rw.open .row{
  border:none;
  border-bottom:1px solid rgba(var(--th-accent-rgb),var(--th-row-border-alpha));
  background:linear-gradient(135deg,rgba(var(--th-accent-rgb),var(--th-row-open-hi)) 0%,rgba(var(--th-accent-rgb),var(--th-row-open-lo)) 100%);
  border-radius:14px 14px 0 0;
  padding-left:20px;
  position:relative;
}
.rw.open .row::before{content:none}
.rw.open .rname{color:var(--th-accent)}
.row:last-child{border-bottom:none}

.rname-wrap{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.item-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-family:'Outfit',sans-serif;font-size:7.5px;font-weight:600;
  letter-spacing:1.8px;text-transform:uppercase;
  border-radius:20px;padding:2px 8px;flex-shrink:0;transition:all .4s;
}
.item-badge.popular{
  background:var(--th-accent);color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.15);opacity:.9;
}
body:not(.ice):not(.tea):not(.shop):not(.pizza) .item-badge.popular{color:var(--c-espresso)}
body.pizza .item-badge.popular{color:#1C1410}
.item-badge.featured{background:transparent;border:1px solid var(--th-accent);color:var(--th-accent)}
.item-badge.veggie{background:rgba(80,160,80,.18);border:1px solid rgba(80,160,80,.4);color:#3a8a3a}
body.pizza .item-badge.veggie{background:rgba(var(--th-accent-rgb),.12);border-color:rgba(var(--th-accent-rgb),.3);color:var(--th-accent)}

.pb-size-value{
  font-family:'Outfit',sans-serif;font-size:6px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  color:rgba(var(--th-accent-rgb),.4);margin-top:2px;transition:color .2s;
}
.pb-size.on .pb-size-value{color:var(--pizza-gold);opacity:.9}

.rname{font-family:'Cormorant Garamond',serif;font-weight:400;line-height:1.15;color:var(--th-dark);transition:color .3s ease,text-shadow .3s ease;overflow-wrap:break-word;word-break:break-word}
.rdesc{font-family:'Outfit',sans-serif;font-weight:300;color:var(--th-muted);line-height:1.55;transition:color .5s;overflow-wrap:break-word;word-break:break-word}
.kcal{display:flex;align-items:center;gap:5px}
.kcal-dot{width:3px;height:3px;border-radius:50%;background:var(--th-accent);flex-shrink:0}
.kcal-text{font-family:'Outfit',sans-serif;font-weight:300;color:var(--th-muted);transition:color .5s}
.pb{text-align:right;flex-shrink:0;padding-top:2px}
.ps{font-family:'Outfit',sans-serif;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:var(--th-muted);white-space:nowrap;display:block;transition:color .5s}
.pv{font-family:'Outfit',sans-serif;font-weight:500;color:var(--th-accent);white-space:nowrap;display:block;transition:color .3s ease,text-shadow .3s ease}

.abox{background:var(--th-surface);border-left:2px solid var(--th-accent);border-radius:0 8px 8px 0;transition:background .5s,border-color .5s,opacity .4s}
body.pizza .abox{background:#221810}
.alabel{font-family:'Outfit',sans-serif;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--th-accent);display:block}
.atags{display:flex;flex-wrap:wrap}
.atag{font-family:'Outfit',sans-serif;font-weight:400;border:1px solid var(--th-border);border-radius:20px;color:var(--th-dark);background:var(--th-bg);transition:background .4s,border-color .4s,color .4s}
body.pizza .atag{background:#1C1410;color:#CFC0A8}

.rchev{
  display:block;font-size:16px;font-weight:300;
  color:var(--th-border);
  transition:transform .45s cubic-bezier(0.34,1.56,0.64,1),color .3s ease,opacity .3s,text-shadow .3s ease;
  text-align:right;margin-top:4px;line-height:1;
  user-select:none;-webkit-user-select:none;flex-shrink:0;
  opacity:.6;
}
.rw.open .rchev{transform:rotate(90deg) scale(1.15);color:var(--th-accent);opacity:1}
.rinfo{
  max-height:0;overflow:hidden;
  transition:max-height .55s cubic-bezier(0.25,0.46,0.45,0.94),opacity .35s ease;
  opacity:0;
  will-change:opacity;
}
.rw.open .rinfo{max-height:600px;opacity:1}
.rinfo-inner{
  background:linear-gradient(180deg,rgba(var(--th-accent-rgb),var(--th-rinfo-bg-alpha)) 0%,var(--th-surface) 40%);
  border:none;
  border-radius:0 0 14px 14px;
  position:relative;overflow:hidden;
  transform:translateY(-6px);
  transition:background .5s,transform .5s cubic-bezier(0.25,0.46,0.45,0.94);
  margin:0;
  padding-left:3px;
}
body.pizza .rinfo-inner{background:linear-gradient(180deg,rgba(var(--th-accent-rgb),var(--th-rinfo-bg-alpha)) 0%,var(--pizza-deep) 40%)}
.rw.open .rinfo-inner{transform:translateY(0)}
.rinfo-inner::before{
  content:'';position:absolute;top:0;left:20px;right:20px;height:1px;
  background:linear-gradient(90deg,transparent,var(--th-accent) 30%,var(--th-accent) 70%,transparent);
  opacity:.2;
}
.rinfo-inner::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:70px;
  background:linear-gradient(to bottom,transparent,rgba(var(--th-accent-rgb),.05));
  pointer-events:none;
}
.rinfo-body{
  display:flex;flex-direction:column;gap:12px;
  padding:18px 22px 20px 20px;
  position:relative;z-index:1;
}
@keyframes rinfo-item-in{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.rw.open .rinfo-body > *{
  animation:rinfo-item-in .4s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
.rw.open .rinfo-body > *:nth-child(1){animation-delay:.05s}
.rw.open .rinfo-body > *:nth-child(2){animation-delay:.13s}
.rw.open .rinfo-body > *:nth-child(3){animation-delay:.21s}
.rw.open .rinfo-body > *:nth-child(4){animation-delay:.27s}
.rw.open .rinfo-body > *:nth-child(5){animation-delay:.32s}
@keyframes rinfo-shimmer{
  0%{opacity:0;transform:scaleX(0.3)}
  60%{opacity:.4;transform:scaleX(0.85)}
  100%{opacity:.2;transform:scaleX(1)}
}
.rw.open .rinfo-inner::before{
  animation:rinfo-shimmer .6s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}
.rinfo-icon{
  display:flex;align-items:center;gap:8px;
  font-size:7px;letter-spacing:4px;
  color:var(--th-accent);opacity:.5;
  transition:color .5s,opacity .4s;
  justify-content:center;
}
.rw.open .rinfo-icon{opacity:.65}
.rinfo-icon::before,.rinfo-icon::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--th-accent));
  opacity:.3;
}
.rinfo-icon::after{background:linear-gradient(90deg,var(--th-accent),transparent)}
.rinfo-text{
  font-family:'Outfit',sans-serif;font-weight:300;
  color:var(--th-muted);line-height:1.85;transition:color .5s;
  font-size:13px;
  text-align:center;
  letter-spacing:.3px;
  overflow-wrap:break-word;word-break:break-word;
}

.tap-hint{display:flex;align-items:center;justify-content:center}
.tap-hint-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--th-surface);border:1px solid var(--th-border);
  border-radius:30px;padding:7px 16px;
  transition:background .5s,border-color .5s;
}
.tap-hint-icon{font-size:11px;opacity:.5;flex-shrink:0}
.tap-hint-text{
  font-family:'Outfit',sans-serif;font-size:8.5px;font-weight:500;
  letter-spacing:1.8px;text-transform:uppercase;
  color:var(--th-muted);white-space:nowrap;transition:color .5s;
}

.allergen-note{display:flex;align-items:flex-start;gap:8px;border-top:1px solid var(--th-border);transition:border-color .5s}
.allergen-icon{font-size:10px;flex-shrink:0;opacity:.6;margin-top:2px}
.allergen-body{font-family:'Outfit',sans-serif;font-weight:300;color:var(--th-muted);line-height:1.5;font-style:italic;transition:color .5s}
.a-pills{display:flex;flex-wrap:wrap;margin-top:5px}
.a-pill{font-family:'Outfit',sans-serif;font-weight:400;border:1px solid var(--th-border);border-radius:20px;color:var(--th-muted);background:var(--th-surface);transition:all .4s}
body.pizza .a-pill{background:#2A1F18}

.product-table{width:100%;border-collapse:collapse;margin-top:6px}
.product-table th{font-family:'Outfit',sans-serif;font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--shop-muted);text-align:left;padding:7px 0 5px;border-bottom:1px solid var(--shop-border)}
.product-table th:last-child{text-align:right}
.product-table td{font-family:'Outfit',sans-serif;font-size:13px;font-weight:400;color:var(--shop-dark);padding:10px 0;border-bottom:1px solid var(--shop-border);vertical-align:middle}
.product-table tr:last-child td{border-bottom:none}
.product-table td:last-child{text-align:right;font-weight:600;color:var(--shop-accent);white-space:nowrap}
.pt-sub{font-size:10.5px;color:var(--shop-muted);font-weight:300;margin-left:6px}
.pnote{border-radius:8px;font-family:'Outfit',sans-serif;font-weight:300;letter-spacing:.5px;color:#7A6A58;text-align:center;font-style:italic;border:1px solid #3A2E24}
.sec{display:none}
.sec.on{display:block;animation:sec-fadein .32s ease}
@keyframes sec-fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── PIZZA BUILDER ── */
.pizza-builder{
  background:linear-gradient(170deg,#1A1210 0%,#110D08 60%,#0E0A06 100%);
  border:1px solid #2E2018;border-radius:14px;overflow:hidden;
  box-shadow:0 6px 32px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3),
             inset 0 1px 0 rgba(var(--th-accent-rgb),.1);
  position:relative;
}
.pizza-builder::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent 0%,rgba(var(--th-accent-rgb),.7) 35%,rgba(var(--th-accent-rgb),.7) 65%,transparent 100%);
  pointer-events:none;z-index:1;
}
.pizza-builder::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(var(--th-accent-rgb),.045) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}
.pb-header-eyebrow{
  font-family:'Outfit',sans-serif;font-size:8px;font-weight:500;
  letter-spacing:5px;text-transform:uppercase;
  color:var(--pizza-gold);opacity:.75;margin-bottom:8px;
}
.pb-header-title{
  font-family:'Cormorant Garamond',serif;font-weight:300;font-size:28px;
  color:#EDE5D8;line-height:1;letter-spacing:-1px;
}
.pb-header-title em{font-style:italic;color:var(--pizza-gold);font-weight:300}
.pb-inner{padding:16px 18px 20px;position:relative;z-index:1}
.pb-section{margin-bottom:14px}
.pb-section:last-of-type{margin-bottom:0}
.pb-sec-label{
  display:flex;align-items:center;gap:7px;
  font-family:'Outfit',sans-serif;font-size:7.5px;font-weight:600;
  letter-spacing:3px;text-transform:uppercase;color:rgba(200,160,80,.8);
  margin-bottom:9px;
}
.pb-sec-label::before{
  content:'';width:14px;height:1px;
  background:linear-gradient(90deg,rgba(200,160,80,.6),transparent);
  flex-shrink:0;
}
.pb-sec-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(200,160,80,.12),transparent);
}
.pb-sec-optional{font-size:7px;font-weight:300;letter-spacing:1px;opacity:.7;font-style:italic;text-transform:none;margin-left:1px}
.pb-tags{display:flex;flex-wrap:wrap;gap:5px}
.pb-tag{
  font-family:'Outfit',sans-serif;font-size:12.5px;font-weight:400;
  border:1px solid rgba(255,255,255,.09);border-radius:6px;padding:7px 13px;
  color:#B8A898;background:rgba(255,255,255,.03);cursor:pointer;
  transition:all .18s;-webkit-appearance:none;appearance:none;touch-action:manipulation;
  line-height:1.3;letter-spacing:.2px;
}
.pb-tag:hover{background:rgba(184,58,34,.10);border-color:rgba(184,58,34,.45);color:#D4B8A8}
.pb-tag:active,.pb-tag.on{background:rgba(184,58,34,.18);border-color:rgba(184,58,34,.65);color:#F0C8B0;font-weight:500}
.pb-tag.on{box-shadow:0 0 8px rgba(184,58,34,.15),inset 0 1px 0 rgba(255,255,255,.05)}
.pb-tag.locked{background:transparent;border-color:rgba(255,255,255,.03);color:#2E2018;cursor:default;opacity:.4;font-style:italic}
.pb-size:active{background:rgba(var(--th-accent-rgb),.1);border-color:rgba(var(--th-accent-rgb),.55)}
.pizza-order-shortcut:active{background:rgba(184,58,34,.22)}
.pb-size-row{display:flex;gap:6px}
.pb-size{
  font-family:'Cormorant Garamond',serif;font-weight:400;font-size:25px;
  flex:1;padding:12px 4px;letter-spacing:0;
  border:1px solid rgba(255,255,255,.06);border-radius:8px;
  background:rgba(255,255,255,.03);color:#A89880;cursor:pointer;
  transition:all .2s;-webkit-appearance:none;appearance:none;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  touch-action:manipulation;line-height:1;
}
.pb-size span{font-family:'Outfit',sans-serif;font-size:8.5px;font-weight:300;letter-spacing:1.8px;text-transform:uppercase;opacity:.85}
.pb-size:hover{border-color:rgba(140,100,70,.7);color:#C4AA90;background:rgba(255,255,255,.04)}
.pb-size.on{
  background:rgba(var(--th-accent-rgb),.08);border-color:rgba(var(--th-accent-rgb),.45);
  color:var(--pizza-gold);
  box-shadow:0 2px 12px rgba(var(--th-accent-rgb),.1),inset 0 1px 0 rgba(var(--th-accent-rgb),.08);
}
.pb-divider{
  height:1px;margin:14px 0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06) 25%,rgba(255,255,255,.06) 75%,transparent);
}
.pb-summary{
  background:rgba(8,5,3,.55);border:1px solid rgba(255,255,255,.05);
  border-radius:8px;padding:12px 14px;position:relative;overflow:hidden;
  backdrop-filter:blur(4px);
}
.pb-summary::before{
  content:'';position:absolute;top:0;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--th-accent-rgb),.2),transparent);
}
.pb-summary-label{
  font-family:'Outfit',sans-serif;font-size:7px;font-weight:600;
  letter-spacing:3px;text-transform:uppercase;color:rgba(200,160,80,.75);
  margin-bottom:7px;display:flex;align-items:center;gap:6px;
}
.pb-summary-label::after{content:'';flex:1;height:1px;background:rgba(200,160,80,.1)}
.pb-summary-text{
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:300;
  color:#C8B8A8;line-height:1.6;min-height:18px;
  transition:color .2s;
}
.pb-summary-price{
  font-family:'Outfit',sans-serif;font-size:17px;font-weight:500;
  color:var(--pizza-gold);margin-top:10px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid rgba(255,255,255,.05);padding-top:10px;line-height:1;
}
.pb-summary-size-badge{
  font-family:'Outfit',sans-serif;
  font-size:7px;font-weight:500;letter-spacing:1.8px;text-transform:uppercase;
  color:#9A8878;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);
  border-radius:3px;padding:3px 8px;
}
.pb-reset{
  font-family:'Outfit',sans-serif;font-size:7.5px;font-weight:500;
  letter-spacing:2.5px;text-transform:uppercase;color:#8A7A68;
  background:none;border:none;cursor:pointer;padding:0;margin-top:8px;
  display:block;width:100%;text-align:right;transition:color .2s;
  touch-action:manipulation;
}
.pb-reset:hover{color:#B09A88}
.pb-order-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;margin-top:8px;padding:15px;
  background:linear-gradient(150deg,#B83828 0%,#7A2216 100%);
  border:none;border-top:1px solid rgba(255,255,255,.06);border-radius:8px;
  font-family:'Outfit',sans-serif;font-size:12.5px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;color:#FFE4D4;
  cursor:pointer;transition:opacity .2s,transform .12s,box-shadow .2s;
  touch-action:manipulation;-webkit-appearance:none;appearance:none;
  box-shadow:0 4px 16px rgba(184,56,40,.3);
}
.pb-order-btn:hover{opacity:.88;box-shadow:0 6px 20px rgba(184,56,40,.4)}
.pb-order-btn:active{transform:scale(.985);box-shadow:0 2px 8px rgba(184,56,40,.25)}
.pb-order-btn svg{width:16px;height:16px;flex-shrink:0;opacity:.8}

/* ── İçecek chips — yeni kompakt tasarım ── */
.pb-drink-chips{display:flex;flex-wrap:wrap;gap:6px}
.pb-drink-chip{
  display:inline-flex;align-items:center;justify-content:center;
  padding:7px 13px 7px 9px;
  border:1px solid rgba(255,255,255,.09);border-radius:6px;
  background:rgba(255,255,255,.03);
  font-family:'Outfit',sans-serif;
  cursor:pointer;transition:all .18s;
  -webkit-appearance:none;appearance:none;touch-action:manipulation;
}
.pb-drink-chip:hover{border-color:rgba(184,58,34,.45);background:rgba(184,58,34,.10)}
.pb-drink-chip.active{
  border-color:rgba(184,58,34,.65);
  background:rgba(184,58,34,.18);
  box-shadow:0 0 8px rgba(184,58,34,.15),inset 0 1px 0 rgba(255,255,255,.05);
  padding-left:7px;
}
.pb-dc-minus{
  display:none;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:50%;
  border:1px solid rgba(184,58,34,.4);
  font-size:13px;line-height:1;color:rgba(184,58,34,.8);
  margin-right:7px;flex-shrink:0;
  transition:border-color .15s,color .15s;
}
.pb-drink-chip.active .pb-dc-minus{display:flex}
.pb-dc-minus:hover{border-color:#B83A22;color:#D05030}
.pb-dc-label{
  font-size:12.5px;font-weight:400;color:#B8A898;
  transition:color .18s;white-space:nowrap;
  display:flex;align-items:center;line-height:1;
}
.pb-drink-chip.active .pb-dc-label{color:#F0D0B0}
.pb-dc-price{
  font-size:10px;font-weight:400;color:#806858;
  margin-left:5px;white-space:nowrap;transition:color .18s;
  display:flex;align-items:center;line-height:1;
}
.pb-drink-chip.active .pb-dc-price{color:rgba(200,160,80,.65)}
.pb-dc-count{
  display:none;
  font-size:10px;font-weight:600;color:var(--pizza-gold);
  margin-left:5px;white-space:nowrap;
  line-height:1;
}
.pb-drink-chip.active .pb-dc-count{display:inline-flex;align-items:center}

.pizza-preset-row{cursor:pointer;position:relative}
.pizza-preset-row .pb{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.pizza-order-shortcut{
  font-family:'Outfit',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;
  background:transparent;border:1px solid rgba(184,58,34,.5);
  color:rgba(184,58,34,.85);border-radius:5px;padding:4px 10px;
  cursor:pointer;transition:background .2s,color .2s,border-color .2s;
  -webkit-appearance:none;appearance:none;touch-action:manipulation;
  white-space:nowrap;
}
.pizza-order-shortcut:hover{background:rgba(184,58,34,.12);border-color:var(--pizza-red);color:var(--pizza-red)}
.pizza-order-shortcut:active{background:rgba(184,58,34,.22)}
@keyframes pb-flash{
  0%{box-shadow:0 0 0 0 rgba(184,58,34,.5)}
  50%{box-shadow:0 0 0 8px rgba(184,58,34,.0)}
  100%{box-shadow:0 0 0 0 rgba(184,58,34,.0)}
}
.pizza-builder.preset-loaded{animation:pb-flash .6s ease-out}

.lang-bar{display:flex;justify-content:flex-end;padding:10px 18px 0;max-width:760px;margin:0 auto;box-sizing:border-box}
@media(min-width:640px){.lang-bar{padding:14px 32px 0}}
.lang-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Outfit',sans-serif;font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;
  background:var(--th-surface);border:1px solid var(--th-border);border-radius:20px;
  color:var(--th-muted);padding:5px 13px;cursor:pointer;
  transition:all .25s;-webkit-appearance:none;appearance:none;touch-action:manipulation;
}
.lang-btn:hover{background:var(--th-bg);border-color:var(--th-accent);color:var(--th-dark)}
body.pizza .lang-btn{background:rgba(40,28,18,.8)}
body.pizza .lang-btn:hover{background:#2A1F18;border-color:var(--pizza-gold);color:var(--pizza-gold)}
.lang-dot{width:5px;height:5px;border-radius:50%;background:var(--th-accent);flex-shrink:0;transition:background .25s}
.lang-btn.is-en{background:var(--th-mid);border-color:var(--th-mid);color:var(--th-bg)}
body.pizza .lang-btn.is-en{background:var(--pizza-gold);border-color:var(--pizza-gold);color:var(--pizza-deep)}

.foot{text-align:center;font-family:'Outfit',sans-serif;font-weight:300;letter-spacing:4px;text-transform:uppercase;color:var(--th-border);transition:color .5s;padding-bottom:max(28px,env(safe-area-inset-bottom))}
.foot-inner{display:inline-flex;align-items:center;gap:12px}
.foot-line{width:20px;height:1px;background:currentColor;opacity:.5}

<body>

<!-- ═══ DİL BUTONU ═══ -->

  </button>

<!-- ═══ NAV ═══ -->

<script>
/* ─────────────────────────────────────────────────────────────────
   DURUM DEĞİŞKENLERİ
───────────────────────────────────────────────────────────────── */
var currentLang = 'tr';
var currentTab  = 'coffee';

/* cfg/cfgEn renderMenu() tarafından doldurulur */
var cfg   = {};
var cfgEn = {};

/* Akordeon için dinamik ID listesi (pizza hariç) */
var accordionIds = [];

/* ─────────────────────────────────────────────────────────────────
   YARDIMCI: DİL BİRLEŞTİRME
   Object.assign'in boş string ile geçerli değerleri ezmesini önler
───────────────────────────────────────────────────────────────── */
function mergeLang(base, override) {
  var result = Object.assign({}, base);
  Object.keys(override).forEach(function(k) {
    var v = override[k];
    if (v !== undefined && v !== null && v !== '') result[k] = v;
  });
  return result;
}

/* ─────────────────────────────────────────────────────────────────
   DİL UYGULAMA — data-i18n="text"|"html" ile tek mekanizma
───────────────────────────────────────────────────────────────── */
function applyLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;

  var lb = document.getElementById('langToggle');
  var ll = document.getElementById('langLabel');
  if (lb && ll) {
    lb.classList.toggle('is-en', lang === 'en');
    ll.textContent = lang === 'en' ? 'TR' : 'EN';
  }

  /* data-i18n="text" — saf metin elementleri */
  document.querySelectorAll('[data-i18n="text"]').forEach(function(el) {
    el.textContent = lang === 'en'
      ? (el.getAttribute('data-i18n-en') || el.getAttribute('data-i18n-tr'))
      : el.getAttribute('data-i18n-tr');
  });

  /* data-i18n="html" — HTML markup içeren elementler (em, strong vb.) */
  document.querySelectorAll('[data-i18n="html"]').forEach(function(el) {
    el.innerHTML = lang === 'en'
      ? (el.getAttribute('data-i18n-en') || el.getAttribute('data-i18n-tr'))
      : el.getAttribute('data-i18n-tr');
  });

  /* Hero / footer metinleri go() ile güncellenir — akordeonlar açık kalır */
  go(currentTab, {closeAccordions: false});

  /* Pizza builder özetini yenile */
  var bld = document.getElementById('pizzaBuilder');
  if (bld) bld.dispatchEvent(new Event('lang-changed'));
}

/* ─────────────────────────────────────────────────────────────────
   DİL TOGGLE DİNLEYİCİSİ
───────────────────────────────────────────────────────────────── */
(function() {
  var lb = document.getElementById('langToggle');
  if (!lb) return;
  var _busy = false;
  lb.addEventListener('click', function() {
    if (_busy) return;
    _busy = true;
    var body = document.body;
    /* 1) Fade-out animasyonu başlat */
    body.classList.add('lang-fading-out');
    setTimeout(function() {
      /* 2) İçerik güncelle */
      applyLang(currentLang === 'tr' ? 'en' : 'tr');
      /* 3) Fade-out class'ı kaldır, reflow zorla (animasyon restart için şart) */
      body.classList.remove('lang-fading-out');
      void body.offsetHeight; /* tarayıcıyı yeniden hesaplamaya zorla */
      /* 4) Fade-in animasyonu başlat */
      body.classList.add('lang-fading-in');
      setTimeout(function() {
        body.classList.remove('lang-fading-in');
        _busy = false;
      }, 480);
    }, 180);
  });
})();

/* ─────────────────────────────────────────────────────────────────
   SEKME GEÇİŞİ — Küçük, tek sorumluluğu olan alt fonksiyonlar
───────────────────────────────────────────────────────────────── */

/* Aktif section ve nav butonunu günceller */
function activateSection(tab) {
  var secEl = document.getElementById(tab);
  if (!secEl || secEl.classList.contains('on')) return;
  document.querySelectorAll('.sec').forEach(function(e) { e.classList.remove('on'); });
  secEl.classList.add('on');
  document.querySelectorAll('.nb').forEach(function(e) { e.classList.remove('on'); });
  var ctaBtn = document.getElementById('pizzaCTA');
  if (ctaBtn) ctaBtn.classList.remove('on');
  var activeBtn = document.querySelector('[data-tab="' + tab + '"]');
  if (activeBtn) activeBtn.classList.add('on');
}

/* Tema class'ını body'e uygular */
function applyTheme(cls) {
  ['ice','tea','shop','pizza'].forEach(function(t) { document.body.classList.remove(t); });
  if (cls) document.body.classList.add(cls);
}

/* Hero bölümünü günceller */
function applyHero(tabCfg, tabCfgEn) {
  var eyebrow = document.getElementById('eyebrow');
  var htitle  = document.getElementById('htitle');
  var hsub    = document.getElementById('hsub');
  var extWrap = document.getElementById('extras-wrap');

  if (eyebrow) eyebrow.textContent = (currentLang === 'en' ? (tabCfgEn.ey || tabCfg.ey) : tabCfg.ey) || '';
  if (htitle) {
    htitle.setAttribute('data-i18n',    'html');
    htitle.setAttribute('data-i18n-tr', tabCfg.t   || '');
    htitle.setAttribute('data-i18n-en', tabCfgEn.t || tabCfg.t || '');
    htitle.innerHTML = (currentLang === 'en' ? (tabCfgEn.t || tabCfg.t) : tabCfg.t) || '';
  }
  if (hsub) hsub.textContent = (currentLang === 'en' ? (tabCfgEn.sub || tabCfg.sub) : tabCfg.sub) || '';
  if (extWrap) extWrap.style.display = tabCfg.ext ? '' : 'none';
}

/* Footer metnini günceller */
function applyFooter(tabCfg, tabCfgEn) {
  var footTxt = document.getElementById('foot-text');
  if (footTxt) footTxt.textContent = (currentLang === 'en' ? (tabCfgEn.foot || tabCfg.foot) : tabCfg.foot) || '';
}

/* Açık akordeonları kapatır */
function closeAccordions() {
  document.querySelectorAll('.rw.open').forEach(function(r) {
    r.classList.remove('open');
    var rBtn = r.querySelector('[role="button"]');
    if (rBtn) rBtn.setAttribute('aria-expanded', 'false');
  });
}

/* Ana orkestratör — sadece alt fonksiyonları sırayla çağırır */
function go(tab, opts) {
  currentTab = tab;
  var tabCfg   = cfg[tab]   || {};
  var tabCfgEn = cfgEn[tab] || {};

  activateSection(tab);
  applyTheme(tabCfg.cls);
  applyHero(tabCfg, tabCfgEn);
  applyFooter(tabCfg, tabCfgEn);

  if (!opts || opts.closeAccordions !== false) closeAccordions();
}

/* ─────────────────────────────────────────────────────────────────
   YARDIMCI FONKSİYONLAR
───────────────────────────────────────────────────────────────── */
function formatKcal(raw) {
  if (!raw) return '';
  if (raw.indexOf('kcal') >= 0) return raw;
  if (raw.indexOf('(') >= 0) return raw;
  return raw + ' kcal';
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ─────────────────────────────────────────────────────────────────
   RENDER: BÖLÜM AYRAÇ
───────────────────────────────────────────────────────────────── */
function makeDivider(titleTr, titleEn, extraStyle) {
  var dl = document.createElement('div');
  dl.className = 'dl';
  if (extraStyle) dl.style.cssText = extraStyle;
  dl.innerHTML =
    '<span class="dl-text" data-i18n="text" data-i18n-tr="' + esc(titleTr) + '" data-i18n-en="' + esc(titleEn || titleTr) + '">' + esc(titleTr) + '</span>';
  return dl;
}

/* ─────────────────────────────────────────────────────────────────
   RENDER: NORMAL ÜRÜN SATIRI
───────────────────────────────────────────────────────────────── */
function makeItemRow(item) {
  var row = document.createElement('div');
  row.className = 'row';
  if (item.info && item.info.tr) {
    row.setAttribute('data-info',    item.info.tr);
    row.setAttribute('data-info-en', item.info.en || '');
  }

  /* Sol sütun */
  var left = document.createElement('div');
  left.className = 'row-left';

  /* İsim */
  var nameTr = (item.name && item.name.tr) ? item.name.tr : (item.name || '');
  var nameEn = (item.name && item.name.en) ? item.name.en : nameTr;
  var badgeMap = { popular: ['Popüler','Popular'], featured: ['Öne Çıkan','Featured'], veggie: ['Vejetaryen','Vegetarian'] };

  if (item.badge) {
    var bArr = badgeMap[item.badge] || [item.badge, item.badge];
    left.innerHTML +=
      '<div class="rname-wrap">' +
        '<div class="rname" data-i18n="text" data-i18n-tr="' + esc(nameTr) + '" data-i18n-en="' + esc(nameEn) + '">' + esc(nameTr) + '</div>' +
        '<span class="item-badge ' + esc(item.badge) + '" data-i18n="text" data-i18n-tr="' + esc(bArr[0]) + '" data-i18n-en="' + esc(bArr[1]) + '">' + esc(bArr[0]) + '</span>' +
      '</div>';
  } else {
    left.innerHTML += '<div class="rname" data-i18n="text" data-i18n-tr="' + esc(nameTr) + '" data-i18n-en="' + esc(nameEn) + '">' + esc(nameTr) + '</div>';
  }

  /* Açıklama */
  var descTr = (item.desc && item.desc.tr) ? item.desc.tr : (item.desc || '');
  var descEn = (item.desc && item.desc.en) ? item.desc.en : descTr;
  if (descTr) {
    left.innerHTML += '<div class="rdesc" data-i18n="text" data-i18n-tr="' + esc(descTr) + '" data-i18n-en="' + esc(descEn) + '">' + esc(descTr) + '</div>';
  }

  /* Kalori */
  if (item.kcal) {
    left.innerHTML +=
      '<div class="kcal"><span class="kcal-dot"></span>' +
      '<span class="kcal-text">' + esc(formatKcal(item.kcal)) + '</span></div>';
  }

  /* Aroma/çekirdek kutusu */
  if (item.tags) {
    var labelTr = (item.tags.label && item.tags.label.tr) ? item.tags.label.tr : (item.tags.label || '');
    var labelEn = (item.tags.label && item.tags.label.en) ? item.tags.label.en : labelTr;
    var tagItems = item.tags.items || [];
    var tagsHtml = tagItems.map(function(t) {
      var tTr = t.tr || t;
      var tEn = t.en || tTr;
      return '<span class="atag" data-i18n="text" data-i18n-tr="' + esc(tTr) + '" data-i18n-en="' + esc(tEn) + '">' + esc(tTr) + '</span>';
    }).join('');
    left.innerHTML +=
      '<div class="abox">' +
        '<span class="alabel" data-i18n="text" data-i18n-tr="' + esc(labelTr) + '" data-i18n-en="' + esc(labelEn) + '">' + esc(labelTr) + '</span>' +
        '<div class="atags">' + tagsHtml + '</div>' +
      '</div>';
  }

  /* Özel tablo (product-table) */
  if (item.table && item.table.rows) {
    var tlTr = (item.table.label && item.table.label.tr) || '';
    var tlEn = (item.table.label && item.table.label.en) || tlTr;
    var tHtml = '<div class="abox" style="margin-top:10px">' +
      '<span class="alabel" style="color:var(--shop-accent)" data-i18n="text" data-i18n-tr="' + esc(tlTr) + '" data-i18n-en="' + esc(tlEn) + '">' + esc(tlTr) + '</span>' +
      '<table class="product-table"><thead><tr>' +
      '<th data-i18n="text" data-i18n-tr="Miktar" data-i18n-en="Amount">Miktar</th>' +
      '<th style="text-align:right" data-i18n="text" data-i18n-tr="Fiyat" data-i18n-en="Price">Fiyat</th>' +
      '</tr></thead><tbody>';
    item.table.rows.forEach(function(r) {
      var qtyStr = r.qty || '';
      var subTr  = (r.label && r.label.tr) ? r.label.tr : '';
      var subEn  = (r.label && r.label.en) ? r.label.en : subTr;
      tHtml += '<tr><td>' + esc(qtyStr) +
        (subTr ? '<span class="pt-sub" data-i18n="text" data-i18n-tr="' + esc(subTr) + '" data-i18n-en="' + esc(subEn) + '">' + esc(subTr) + '</span>' : '') +
        '</td><td>' + esc(r.price) + '₺</td></tr>';
    });
    tHtml += '</tbody></table></div>';
    left.innerHTML += tHtml;
  }

  row.appendChild(left);

  /* Sağ sütun — fiyat (tablolu ürünlerde yok sayılır) */
  var sizes  = item.sizes  || [];
  var prices = item.prices || [];
  var pb = document.createElement('div');
  pb.className = 'pb';
  var psText = (item.table && !item.pvLabel) ? '' : (item.psLabel ? item.psLabel : sizes.join(' \u00B7 '));
  var pvText = item.pvLabel ? item.pvLabel : (prices.length ? prices.join(' \u00B7 ') + '\u20BA' : '');
  if (psText || pvText) {
    pb.innerHTML =
      '<span class="ps">' + esc(psText) + '</span>' +
      (pvText ? '<span class="pv">' + esc(pvText) + '</span>' : '');
    row.appendChild(pb);
  }
  return row;
}

/* ─────────────────────────────────────────────────────────────────
   RENDER: ALLERJEN NOTU
───────────────────────────────────────────────────────────────── */
function makeAllergenNote(allergen, customStyle) {
  if (!allergen) return null;
  var note = document.createElement('div');
  note.className = 'allergen-note';
  if (customStyle) note.style.cssText = customStyle;
  if (allergen.borderColor) note.style.borderColor = allergen.borderColor;

  var pillsHtml = (allergen.pills || []).map(function(p) {
    var pillStyle = allergen.pillStyle ? ' style="' + esc(allergen.pillStyle) + '"' : '';
    return '<span class="a-pill" data-i18n="text" data-i18n-tr="' + esc(p.tr) + '" data-i18n-en="' + esc(p.en || p.tr) + '"' + pillStyle + '>' + esc(p.tr) + '</span>';
  }).join('');

  note.innerHTML =
    '<span class="allergen-icon">&#9888;&#65039;</span>' +
    '<div>' +
      '<div class="allergen-body" data-i18n="html"' +
        ' data-i18n-tr="' + esc(allergen.bodyTr) + '"' +
        ' data-i18n-en="' + esc(allergen.bodyEn || allergen.bodyTr) + '">' +
        allergen.bodyTr +
      '</div>' +
      '<div class="a-pills">' + pillsHtml + '</div>' +
    '</div>';
  return note;
}

/* ─────────────────────────────────────────────────────────────────
   RENDER: PIZZA PRESET SATIRI
───────────────────────────────────────────────────────────────── */
function makePizzaPresetRow(item) {
  var row = document.createElement('div');
  row.className = 'row pizza-preset-row';
  if (item.preset) row.setAttribute('data-preset', item.preset);

  var nameTr = (item.name && item.name.tr) ? item.name.tr : (item.name || '');
  var nameEn = (item.name && item.name.en) ? item.name.en : nameTr;
  var descTr = (item.desc && item.desc.tr) ? item.desc.tr : (item.desc || '');
  var descEn = (item.desc && item.desc.en) ? item.desc.en : descTr;
  var badgeMap = { popular: ['Popüler','Popular'], featured: ['Öne Çıkan','Featured'], veggie: ['Vejetaryen','Vegetarian'] };

  var nameHtml = item.badge
    ? (function() {
        var bArr = badgeMap[item.badge] || [item.badge, item.badge];
        return '<div class="rname-wrap">' +
          '<div class="rname" data-i18n="text" data-i18n-tr="' + esc(nameTr) + '" data-i18n-en="' + esc(nameEn) + '">' + esc(nameTr) + '</div>' +
          '<span class="item-badge ' + esc(item.badge) + '" data-i18n="text" data-i18n-tr="' + esc(bArr[0]) + '" data-i18n-en="' + esc(bArr[1]) + '">' + esc(bArr[0]) + '</span>' +
        '</div>';
      })()
    : '<div class="rname" data-i18n="text" data-i18n-tr="' + esc(nameTr) + '" data-i18n-en="' + esc(nameEn) + '">' + esc(nameTr) + '</div>';

  var sizes  = item.sizes  || [];
  var prices = item.prices || [];

  row.innerHTML =
    '<div class="row-left">' + nameHtml +
      (descTr ? '<div class="rdesc" data-i18n="text" data-i18n-tr="' + esc(descTr) + '" data-i18n-en="' + esc(descEn) + '">' + esc(descTr) + '</div>' : '') +
    '</div>' +
    '<div class="pb">' +
      (sizes.length ? '<span class="ps">' + esc(sizes.join(' \u00B7 ')) + '</span>' : '') +
      (prices.length ? '<span class="pv">' + esc(prices.join(' \u00B7 ')) + '\u20BA</span>' : '') +
      '<button class="pizza-order-shortcut" data-i18n="text" data-i18n-tr="Sipari\u015F Ver" data-i18n-en="Order Now">Sipari\u015F Ver</button>' +
    '</div>';
  return row;
}

/* ─────────────────────────────────────────────────────────────────
   RENDER: PIZZA BUILDER
───────────────────────────────────────────────────────────────── */
function makePizzaBuilder(builder, noteTr, noteEn) {
  var div = document.createElement('div');
  div.className = 'pizza-builder';
  div.id = 'pizzaBuilder';

  var inner = document.createElement('div');
  inner.className = 'pb-inner';

  /* Kompakt builder başlığı */
  var pbHead = document.createElement('div');
  pbHead.style.cssText = 'margin-bottom:12px;';
  pbHead.innerHTML =
    '<div>' +
      '<div class="pb-header-eyebrow" data-i18n="text" data-i18n-tr="Kendi pizzanı oluştur" data-i18n-en="Build your pizza">Kendi pizzanı oluştur</div>' +
      '<div class="pb-header-title"><em>Oluştur</em></div>' +
    '</div>';
  inner.appendChild(pbHead);

  /* Boyut bölümü */
  var sizeSection = document.createElement('div');
  sizeSection.className = 'pb-section';
  var sizeLabelEl = document.createElement('div');
  sizeLabelEl.className = 'pb-sec-label';
  sizeLabelEl.setAttribute('data-i18n', 'text');
  sizeLabelEl.setAttribute('data-i18n-tr', 'Boyut');
  sizeLabelEl.setAttribute('data-i18n-en', 'Size');
  sizeLabelEl.textContent = 'Boyut';
  var sizeRow = document.createElement('div');
  sizeRow.className = 'pb-size-row';

  (builder.sizes || []).forEach(function(sz, idx) {
    var labelTr = (sz.label && sz.label.tr) ? sz.label.tr : sz.id;
    var labelEn = (sz.label && sz.label.en) ? sz.label.en : labelTr;
    var btn = document.createElement('button');
    btn.className = 'pb-size' + (idx === 0 ? ' on' : '');
    btn.setAttribute('data-size',  sz.id);
    btn.setAttribute('data-price', sz.price);
    btn.innerHTML = esc(sz.id) +
      ' <span data-i18n="text" data-i18n-tr="' + esc(labelTr) + '" data-i18n-en="' + esc(labelEn) + '">' + esc(labelTr) + '</span>' +
      '<span class="pb-size-value">' + sz.price + ' \u20BA</span>';
    sizeRow.appendChild(btn);
  });
  sizeSection.appendChild(sizeLabelEl);
  sizeSection.appendChild(sizeRow);
  inner.appendChild(sizeSection);

  var div1 = document.createElement('div'); div1.className = 'pb-divider';
  inner.appendChild(div1);

  /* Malzeme bölümleri */
  (builder.sections || []).forEach(function(sec) {
    var secDiv = document.createElement('div');
    secDiv.className = 'pb-section';
    var secLabelTr = (sec.label && sec.label.tr) ? sec.label.tr : '';
    var secLabelEn = (sec.label && sec.label.en) ? sec.label.en : secLabelTr;

    if (sec.type === 'drinks') {
      var lbl = document.createElement('div');
      lbl.className = 'pb-sec-label';
      lbl.innerHTML =
        '<span data-i18n="text" data-i18n-tr="' + esc(secLabelTr) + '" data-i18n-en="' + esc(secLabelEn) + '">' + esc(secLabelTr) + '</span>' +
        ' <span class="pb-sec-optional" data-i18n="text" data-i18n-tr="(opsiyonel)" data-i18n-en="(optional)">(opsiyonel)</span>';
      secDiv.appendChild(lbl);

      var drinkChips = document.createElement('div');
      drinkChips.className = 'pb-drink-chips';
      (sec.items || []).forEach(function(drink) {
        var dTr  = (drink.label && drink.label.tr) ? drink.label.tr : drink.id;
        var dEn  = (drink.label && drink.label.en) ? drink.label.en : dTr;
        var priceStr = drink.price > 0 ? '+' + drink.price + '\u20BA' : '\u20BA0';
        var chip = document.createElement('button');
        chip.className = 'pb-drink-chip';
        chip.setAttribute('data-drink', drink.id);
        chip.setAttribute('data-price', drink.price || 0);
        chip.type = 'button';
        chip.innerHTML =
          '<span class="pb-dc-minus" aria-hidden="true">\u2212</span>' +
          '<span class="pb-dc-label" data-i18n="text" data-i18n-tr="' + esc(dTr) + '" data-i18n-en="' + esc(dEn) + '">' + esc(dTr) + '</span>' +
          '<span class="pb-dc-price">' + esc(priceStr) + '</span>' +
          '<span class="pb-dc-count">×1</span>';
        drinkChips.appendChild(chip);
      });
      secDiv.appendChild(drinkChips);

      if (noteTr) {
        var pnote = document.createElement('div');
        pnote.className = 'pnote';
        pnote.style.cssText = 'margin-top:10px;padding:8px 14px;font-size:11px;';
        pnote.setAttribute('data-i18n', 'text');
        pnote.setAttribute('data-i18n-tr', noteTr);
        pnote.setAttribute('data-i18n-en', noteEn || '');
        pnote.textContent = noteTr;
        secDiv.appendChild(pnote);
      }

    } else {
      var lbl2 = document.createElement('div');
      lbl2.className = 'pb-sec-label';
      lbl2.setAttribute('data-i18n', 'text');
      lbl2.setAttribute('data-i18n-tr', secLabelTr);
      lbl2.setAttribute('data-i18n-en', secLabelEn);
      lbl2.textContent = secLabelTr;
      secDiv.appendChild(lbl2);

      var tagsDiv = document.createElement('div');
      tagsDiv.className = 'pb-tags';
      (sec.items || []).forEach(function(ing) {
        var ingTr = (ing.label && ing.label.tr) ? ing.label.tr : ing.id;
        var ingEn = (ing.label && ing.label.en) ? ing.label.en : ingTr;
        var btn2 = document.createElement('button');
        btn2.className = 'pb-tag' + (ing.default ? ' on' : '') + (ing.locked ? ' locked' : '');
        if (!ing.locked) btn2.setAttribute('data-ing', ing.id);
        btn2.setAttribute('data-i18n', 'text');
        btn2.setAttribute('data-i18n-tr', ingTr);
        btn2.setAttribute('data-i18n-en', ingEn);
        btn2.innerHTML = esc(ingTr);
        tagsDiv.appendChild(btn2);
      });
      secDiv.appendChild(tagsDiv);
    }
    inner.appendChild(secDiv);
  });

  var div2 = document.createElement('div'); div2.className = 'pb-divider';
  inner.appendChild(div2);

  /* Özet + butonlar */
  var firstSize = builder.sizes && builder.sizes[0];
  inner.insertAdjacentHTML('beforeend',
    '<div class="pb-summary">' +
      '<div class="pb-summary-label" data-i18n="text" data-i18n-tr="Siparişiniz" data-i18n-en="Your Order">Siparişiniz</div>' +
      '<div class="pb-summary-text" id="pbSummaryText">Pizza sosu, mozzarella</div>' +
      '<div class="pb-summary-price">' +
        '<span class="pb-summary-size-badge" id="pbSizeBadge">' +
          (firstSize ? firstSize.id + ' \u00B7 ' + ((firstSize.label && firstSize.label.tr) || firstSize.id) : '') +
        '</span>' +
        '<span id="pbPrice">' + (firstSize ? firstSize.price + ' \u20BA' : '') + '</span>' +
      '</div>' +
    '</div>' +
    '<button class="pb-reset" id="pbReset" data-i18n="text" data-i18n-tr="S\u0131f\u0131rla" data-i18n-en="Reset">S\u0131f\u0131rla</button>' +
    '<button class="pb-order-btn" id="pbOrderBtn">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>' +
        '<line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>' +
      '</svg>' +
      '<span data-i18n="text" data-i18n-tr="Sipari\u015F Ver" data-i18n-en="Order Now">Sipari\u015F Ver</span>' +
    '</button>');

  div.appendChild(inner);
  return div;
}

/* ─────────────────────────────────────────────────────────────────
   YARDIMCI: JSON allergens → makeAllergenNote formatına dönüştür
───────────────────────────────────────────────────────────────── */
function allergenAdapter(a) {
  if (!a) return null;
  return { bodyTr: (a.text && a.text.tr) || '', bodyEn: (a.text && a.text.en) || '', pills: a.pills || [] };
}

/* ─────────────────────────────────────────────────────────────────
   RENDER: KATEGORİ BÖLÜMÜ (KAHVE / SOĞUK / ÇAY / DİĞER)
───────────────────────────────────────────────────────────────── */
function renderRegularCategory(sec, cat) {
  var isFirst = true;
  (cat.sections || []).forEach(function(section) {
    var titleTr = (section.title && section.title.tr) ? section.title.tr : '';
    var titleEn = (section.title && section.title.en) ? section.title.en : titleTr;
    var dl = makeDivider(titleTr, titleEn, isFirst ? 'margin-top:36px' : null);
    sec.appendChild(dl);
    isFirst = false;
    (section.items || []).forEach(function(item) {
      sec.appendChild(makeItemRow(item));
    });
    var sNote = makeAllergenNote(allergenAdapter(section.allergens));
    if (sNote) sec.appendChild(sNote);
  });
  var cNote = makeAllergenNote(allergenAdapter(cat.allergens));
  if (cNote) sec.appendChild(cNote);
}

/* ─────────────────────────────────────────────────────────────────
   RENDER: PİZZA KATEGORİSİ
───────────────────────────────────────────────────────────────── */
function renderPizzaCategory(sec, cat) {
  sec.appendChild(makeDivider('El A\u00E7mas\u0131 Pizzalar', 'Hand-Stretched Pizzas', 'margin-top:36px'));
  (cat.presets || []).forEach(function(item) {
    sec.appendChild(makePizzaPresetRow(item));
  });
  sec.appendChild(makeDivider('Kendi Pizzan\u0131 Olu\u015Ftur', 'Build Your Own Pizza', 'margin-top:46px'));
  var noteTr = cat.note && cat.note.tr ? cat.note.tr : '';
  var noteEn = cat.note && cat.note.en ? cat.note.en : '';
  sec.appendChild(makePizzaBuilder(cat.builder || {}, noteTr, noteEn));
  if (cat.builderNote) {
    var pnote = document.createElement('div');
    pnote.className = 'pnote';
    pnote.style.cssText = 'margin-top:24px;padding:12px 16px;font-size:12px;';
    pnote.setAttribute('data-i18n', 'text');
    pnote.setAttribute('data-i18n-tr', cat.builderNote.tr || '');
    pnote.setAttribute('data-i18n-en', cat.builderNote.en || cat.builderNote.tr || '');
    pnote.textContent = cat.builderNote.tr || '';
    sec.appendChild(pnote);
  }
}

/* ─────────────────────────────────────────────────────────────────
   AKORDEON BAŞLAT
───────────────────────────────────────────────────────────────── */
function initAccordion() {
  accordionIds.forEach(function(id) {
    var sec = document.getElementById(id);
    if (!sec) return;

    if (!sec.querySelector('.row[data-info]')) return; /* açıklaması olan item yoksa hint gösterme */

    var HINT_KEY = 'menu-tap-hint-seen';
    var hintSeen = false;
    try { hintSeen = !!localStorage.getItem(HINT_KEY); } catch(e) {}

    var hint = document.createElement('div');
    hint.className = 'tap-hint' + (hintSeen ? ' tap-hint-hidden' : '');
    hint.innerHTML =
      '<div class="tap-hint-badge">' +
        '<span class="tap-hint-text" data-i18n="text" data-i18n-tr="daha fazla bilgi için ürüne dokun" data-i18n-en="tap item for more info">daha fazla bilgi için ürüne dokun</span>' +
      '</div>';
    var firstDl = sec.querySelector('.dl');
    if (firstDl) sec.insertBefore(hint, firstDl);
    else sec.insertBefore(hint, sec.firstChild);

    sec.querySelectorAll('.row[data-info]').forEach(function(row) {
      var info   = row.getAttribute('data-info');
      var infoEn = row.getAttribute('data-info-en') || '';
      if (!info) return;

      var rw = document.createElement('div');
      rw.className = 'rw';
      row.parentNode.insertBefore(rw, row);
      rw.appendChild(row);

      row.setAttribute('role', 'button');
      row.setAttribute('tabindex', '0');
      row.setAttribute('aria-expanded', 'false');

      var chev = document.createElement('span');
      chev.className = 'rchev';
      chev.innerHTML = '&#8250;';
      var pb = row.querySelector('.pb');
      if (pb) {
        pb.appendChild(chev);
      } else {
        chev.style.cssText = 'margin-left:auto;padding-left:6px;flex-shrink:0';
        row.appendChild(chev);
      }

      var ri = document.createElement('div');
      ri.className = 'rinfo';
      var infoDisplay = (currentLang === 'en' && infoEn) ? infoEn : info;
      ri.innerHTML =
        '<div class="rinfo-inner"><div class="rinfo-body">' +
          '<div class="rinfo-icon">\u2726 &nbsp; \u2726 &nbsp; \u2726</div>' +
          '<p class="rinfo-text" data-i18n="text" data-i18n-tr="' + esc(info) + '" data-i18n-en="' + esc(infoEn) + '">' + esc(infoDisplay) + '</p>' +
        '</div></div>';
      rw.appendChild(ri);

      row.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); row.click(); }
      }, {passive: false});

      row.addEventListener('click', function(e) {
        if (e.target.closest('.abox,.allergen-note,.rinfo')) return;
        /* Hint'i kalıcı gizle */
        if (hint && !hint.classList.contains('tap-hint-hidden')) {
          hint.classList.add('tap-hint-hidden');
          try { localStorage.setItem(HINT_KEY, '1'); } catch(e) {}
        }
        row.classList.add('no-slide');
        setTimeout(function() { row.classList.remove('no-slide'); }, 400);
        var wasOpen = rw.classList.contains('open');
        rw.closest('.sec').querySelectorAll('.rw.open').forEach(function(r) {
          r.classList.remove('open');
          var rBtn = r.querySelector('[role="button"]');
          if (rBtn) rBtn.setAttribute('aria-expanded', 'false');
        });
        if (!wasOpen) {
          rw.classList.add('open');
          row.setAttribute('aria-expanded', 'true');
          setTimeout(function() {
            var rect = rw.getBoundingClientRect();
            var vph  = window.innerHeight || document.documentElement.clientHeight;
            if (rect.bottom > vph - 24) {
              window.scrollBy({top: rect.bottom - vph + 48, behavior: 'smooth'});
            }
          }, 300);
        }
      }, {passive: true});

      row.style.cursor = 'pointer';
    });
  });
}

/* ─────────────────────────────────────────────────────────────────
   PIZZA BUILDER BAŞLAT
───────────────────────────────────────────────────────────────── */
function initPizzaBuilder(builderData) {
  var builder     = document.getElementById('pizzaBuilder');
  var summaryText = document.getElementById('pbSummaryText');
  var priceEl     = document.getElementById('pbPrice');
  var sizeBadge   = document.getElementById('pbSizeBadge');
  var resetBtn    = document.getElementById('pbReset');
  var orderBtn    = document.getElementById('pbOrderBtn');
  var NTFY_KANAL  = 'pizza-siparis-deneme1111';
  if (!builder) return;
  function getOrderBtnOrigHTML() {
    var label = currentLang === 'en' ? 'Order Now' : 'Sipari\u015F Ver';
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span data-i18n="text" data-i18n-tr="Sipari\u015F Ver" data-i18n-en="Order Now">' + label + '</span>';
  }

  /* Boyut etiketleri JSON'dan üret */
  var sizeLabels   = {};
  var sizeLabelsEn = {};
  (builderData.sizes || []).forEach(function(sz) {
    sizeLabels[sz.id]   = sz.id + ' \u00B7 ' + ((sz.label && sz.label.tr) || sz.id);
    sizeLabelsEn[sz.id] = sz.id + ' \u00B7 ' + ((sz.label && sz.label.en) || sz.id);
  });

  var firstSz      = builderData.sizes && builderData.sizes[0];
  var currentSize  = firstSz ? firstSz.id    : 'S';
  var currentPrice = firstSz ? firstSz.price : 0;

  builder.querySelectorAll('.pb-size').forEach(function(btn) {
    btn.addEventListener('click', function() {
      builder.querySelectorAll('.pb-size').forEach(function(b) { b.classList.remove('on'); });
      btn.classList.add('on');
      currentSize  = btn.getAttribute('data-size');
      currentPrice = parseInt(btn.getAttribute('data-price'));
      updateSummary();
    }, {passive: true});
  });

  builder.querySelectorAll('.pb-tag[data-ing]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      btn.classList.toggle('on');
      updateSummary();
    }, {passive: true});
  });

  builder.querySelectorAll('.pb-drink-chip').forEach(function(chip) {
    var qty = 0;
    var countEl = chip.querySelector('.pb-dc-count');
    var minusEl = chip.querySelector('.pb-dc-minus');

    chip.addEventListener('click', function(e) {
      /* − butonu: adet azalt */
      if (e.target === minusEl || minusEl.contains(e.target)) {
        e.stopPropagation();
        qty = Math.max(0, qty - 1);
        if (qty === 0) {
          chip.classList.remove('active');
        } else {
          countEl.textContent = '\u00D7' + qty;
        }
        updateSummary();
        return;
      }
      /* chip gövdesi: seç / adedi artır */
      qty++;
      chip.classList.add('active');
      countEl.textContent = '\u00D7' + qty;
      updateSummary();
    }, {passive: true});
  });

  resetBtn.addEventListener('click', function() {
    builder.querySelectorAll('.pb-tag[data-ing]').forEach(function(b) { b.classList.remove('on'); });
    /* JSON'daki default:true malzemeleri yeniden seç */
    (builderData.sections || []).forEach(function(sec) {
      (sec.items || []).forEach(function(ing) {
        if (ing.default && !ing.locked) {
          var btn = builder.querySelector('.pb-tag[data-ing="' + ing.id + '"]');
          if (btn) btn.classList.add('on');
        }
      });
    });
    builder.querySelectorAll('.pb-drink-chip').forEach(function(c) {
      var cEl = c.querySelector('.pb-dc-count');
      if (cEl) cEl.textContent = '\u00D71';
      c.classList.remove('active');
    });
    builder.querySelectorAll('.pb-size').forEach(function(b) { b.classList.remove('on'); });
    var defaultSizeBtn = builder.querySelector('.pb-size');
    if (defaultSizeBtn) {
      defaultSizeBtn.classList.add('on');
      currentSize  = defaultSizeBtn.getAttribute('data-size');
      currentPrice = parseInt(defaultSizeBtn.getAttribute('data-price'));
    }
    updateSummary();
  }, {passive: true});

  orderBtn.addEventListener('click', function() {
    var drinkPartsO = [], drinkPriceO = 0;
    builder.querySelectorAll('.pb-drink-chip').forEach(function(c) {
      if (!c.classList.contains('active')) return;
      var n = parseInt((c.querySelector('.pb-dc-count').textContent || '1').replace('\u00D7',''));
      if (n > 0) {
        var nameTrO = c.querySelector('.pb-dc-label').getAttribute('data-i18n-tr') || c.getAttribute('data-drink');
        drinkPartsO.push(nameTrO + (n > 1 ? ' x' + n : ''));
        drinkPriceO += parseInt(c.getAttribute('data-price')) * n;
      }
    });
    var totalPriceO = currentPrice + drinkPriceO;
    var trIngs = ['Pizza Sosu'];
    builder.querySelectorAll('.pb-tag.on').forEach(function(b) {
      var ing = b.getAttribute('data-ing');
      if (ing) trIngs.push(b.getAttribute('data-i18n-tr') || ing);
    });
    var baslik = 'Yeni Pizza Siparişi - ' + currentSize;
    var icerik = 'Boyut: ' + (sizeLabels[currentSize] || currentSize) +
      '\nMalzemeler: ' + trIngs.join(', ') +
      (drinkPartsO.length ? '\nİçecek: ' + drinkPartsO.join(', ') : '') +
      '\nFiyat: ' + totalPriceO + ' TL';
    orderBtn.disabled = true;
    orderBtn.innerHTML = currentLang === 'en' ? 'Sending\u2026' : 'G\u00F6nderiliyor\u2026';
    fetch('https://ntfy.sh/' + NTFY_KANAL +
      '?title=' + encodeURIComponent(baslik) +
      '&priority=4&tags=pizza', {
      method: 'POST',
      body: icerik
    }).then(function(res) {
      if (res.ok) {
        orderBtn.innerHTML = '\u2713 ' + (currentLang === 'en' ? 'Order Received!' : 'Sipari\u015F Al\u0131nd\u0131!');
        orderBtn.style.background = '#2A7A3A';
      } else {
        orderBtn.innerHTML = currentLang === 'en' ? 'Error \u2014 Try again' : 'Hata \u2014 Tekrar dene';
        orderBtn.style.background = '#8A3A2A';
        orderBtn.disabled = false;
      }
      setTimeout(function() {
        orderBtn.innerHTML = getOrderBtnOrigHTML();
        orderBtn.style.background = '';
        orderBtn.disabled = false;
      }, 3000);
    }).catch(function() {
      orderBtn.innerHTML = currentLang === 'en' ? 'Connection error \u2014 Try again' : 'Ba\u011Flant\u0131 hatas\u0131 \u2014 Tekrar dene';
      orderBtn.style.background = '#8A3A2A';
      orderBtn.disabled = false;
      setTimeout(function() {
        orderBtn.innerHTML = getOrderBtnOrigHTML();
        orderBtn.style.background = '';
      }, 3000);
    });
  }, {passive: true});

  function updateSummary() {
    var ingsTr = ['Pizza Sosu'], ingsEn = ['Pizza Sauce'];
    builder.querySelectorAll('.pb-tag.on').forEach(function(b) {
      var ing = b.getAttribute('data-ing');
      if (ing) {
        ingsTr.push(b.getAttribute('data-i18n-tr') || ing);
        ingsEn.push(b.getAttribute('data-i18n-en') || ing);
      }
    });
    var drinkParts = [], drinkPrice = 0;
    builder.querySelectorAll('.pb-drink-chip').forEach(function(c) {
      if (!c.classList.contains('active')) return;
      var n = parseInt((c.querySelector('.pb-dc-count').textContent || '1').replace('\u00D7',''));
      if (n > 0) {
        var nameTr = c.querySelector('.pb-dc-label').getAttribute('data-i18n-tr') || c.getAttribute('data-drink');
        var nameEn = c.querySelector('.pb-dc-label').getAttribute('data-i18n-en') || nameTr;
        drinkParts.push((currentLang === 'en' ? nameEn : nameTr) + (n > 1 ? ' x' + n : ''));
        drinkPrice += parseInt(c.getAttribute('data-price')) * n;
      }
    });
    var totalPrice = currentPrice + drinkPrice;
    var ings = currentLang === 'en' ? ingsEn : ingsTr;
    var sep  = currentLang === 'en' ? ' · Drinks: ' : ' · İçecek: ';
    summaryText.textContent = ings.join(', ') + (drinkParts.length ? sep + drinkParts.join(', ') : '');
    priceEl.textContent     = totalPrice + ' \u20BA';
    var szLbls = currentLang === 'en' ? sizeLabelsEn : sizeLabels;
    sizeBadge.textContent   = szLbls[currentSize] || currentSize;
  }

  updateSummary();
  builder.addEventListener('preset-loaded', updateSummary);
  builder.addEventListener('lang-changed',  updateSummary);
}

/* ─────────────────────────────────────────────────────────────────
   PİZZA PRESET SATIRLARI — BUILDER'A YÜKLE
───────────────────────────────────────────────────────────────── */
function initPizzaPresets() {
  document.querySelectorAll('.pizza-preset-row').forEach(function(row) {
    row.addEventListener('click', function(e) {
      if (e.target.closest('.pizza-order-shortcut')) return;
      var preset = row.getAttribute('data-preset');
      if (!preset) return;
      loadPreset(preset);
    }, {passive: true});
    var btn = row.querySelector('.pizza-order-shortcut');
    if (btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var preset = row.getAttribute('data-preset');
        if (!preset) return;
        loadPreset(preset, true);
      });
    }
  });

  function loadPreset(preset, scrollToOrder) {
    var builder = document.getElementById('pizzaBuilder');
    if (!builder) return;
    var ings = preset.split(',').map(function(s) { return s.trim().toLocaleLowerCase('tr'); });
    builder.querySelectorAll('.pb-tag[data-ing]').forEach(function(b) { b.classList.remove('on'); });
    builder.querySelectorAll('.pb-tag[data-ing]').forEach(function(b) {
      if (ings.indexOf(b.getAttribute('data-ing').toLocaleLowerCase('tr')) > -1) b.classList.add('on');
    });
    builder.querySelectorAll('.pb-drink-chip').forEach(function(c) {
      var cEl = c.querySelector('.pb-dc-count');
      if (cEl) cEl.textContent = '\u00D71';
      c.classList.remove('active');
    });
    builder.dispatchEvent(new Event('preset-loaded'));
    builder.classList.remove('preset-loaded');
    void builder.offsetWidth;
    builder.classList.add('preset-loaded');
    setTimeout(function() { builder.classList.remove('preset-loaded'); }, 700);

    setTimeout(function() {
      var sizeRow = builder.querySelector('.pb-size-row');
      var scrollTarget = sizeRow || builder;
      var rect   = scrollTarget.getBoundingClientRect();
      var offset = window.pageYOffset || document.documentElement.scrollTop;
      var pad    = Math.min(64, Math.max(16, window.innerHeight * 0.12));
      window.scrollTo({top: offset + rect.top - pad, behavior: 'smooth'});
      if (scrollToOrder) {
        setTimeout(function() {
          var orderEl = document.getElementById('pbOrderBtn');
          if (!orderEl) return;
          var r2  = orderEl.getBoundingClientRect();
          var o2  = window.pageYOffset || document.documentElement.scrollTop;
          window.scrollTo({top: o2 + r2.top - Math.min(48, window.innerHeight * 0.08), behavior: 'smooth'});
        }, 520);
      }
    }, 80);
  }
}

/* ─────────────────────────────────────────────────────────────────
   ANA NAV DİNLEYİCİLER
───────────────────────────────────────────────────────────────── */
document.getElementById('mainNav').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-tab]');
  if (btn) go(btn.getAttribute('data-tab'));
}, {passive: true});

(function() {
  var cta = document.getElementById('pizzaCTA');
  if (!cta) return;
  cta.addEventListener('click', function() { go('pizza'); }, {passive: true});
})();

/* ─────────────────────────────────────────────────────────────────
   RENDER YARDIMCILARI — renderMenu'dan ayrıştırılmış alt fonksiyonlar
───────────────────────────────────────────────────────────────── */
function buildCfgMaps(data) {
  data.categories.forEach(function(cat) {
    cfg[cat.id] = {
      cls:      cat.theme || '',
      ey:       (cat.hero && cat.hero.eyebrow && cat.hero.eyebrow.tr) || '',
      t:        (cat.hero && cat.hero.title   && cat.hero.title.tr)   || '',
      sub:      (cat.hero && cat.hero.sub     && cat.hero.sub.tr)     || '',
      foot:     (cat.hero && cat.hero.foot    && cat.hero.foot.tr)    || '',
      ext:      cat.showExtras || false,
      ctaTitle: (data.pizzaCta && cat.id === 'pizza') ? data.pizzaCta.title.tr : '',
      ctaSub:   (data.pizzaCta && cat.id === 'pizza') ? data.pizzaCta.sub.tr   : ''
    };
    cfgEn[cat.id] = {
      cls:      cat.theme || '',
      ey:       (cat.hero && cat.hero.eyebrow && cat.hero.eyebrow.en) || '',
      t:        (cat.hero && cat.hero.title   && cat.hero.title.en)   || '',
      sub:      (cat.hero && cat.hero.sub     && cat.hero.sub.en)     || '',
      foot:     (cat.hero && cat.hero.foot    && cat.hero.foot.en)    || '',
      ext:      cat.showExtras || false,
      ctaTitle: (data.pizzaCta && cat.id === 'pizza') ? data.pizzaCta.title.en : '',
      ctaSub:   (data.pizzaCta && cat.id === 'pizza') ? data.pizzaCta.sub.en   : ''
    };
  });
}

function renderExtras(data) {
  var extrasInner = document.getElementById('extrasInner');
  if (!extrasInner || !data.extras || !data.extras.length) return;
  var html = '<span class="extras-label" data-i18n="text" data-i18n-tr="Ekstralar" data-i18n-en="Extras">Ekstralar</span>' +
             '<span class="extras-sep-dot">\u00B7</span>';
  data.extras.forEach(function(ex) {
    var lTr = (ex.label && ex.label.tr) ? ex.label.tr : ex.label;
    var lEn = (ex.label && ex.label.en) ? ex.label.en : lTr;
    html += '<span class="extra-pill">' +
              '<span data-i18n="text" data-i18n-tr="' + esc(lTr) + '" data-i18n-en="' + esc(lEn) + '">' + esc(lTr) + '</span>' +
              ' <span class="extra-price">+' + ex.price + '\u20BA</span>' +
            '</span>';
  });
  extrasInner.innerHTML = html;
}

function renderNavButtons(data) {
  var mainNav = document.getElementById('mainNav');
  mainNav.innerHTML = '';
  data.categories.forEach(function(cat) {
    if (cat.id === 'pizza') return;
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'nb';
    btn.setAttribute('data-tab',   cat.id);
    btn.setAttribute('data-group', 'main');
    var navTr = (cat.nav && cat.nav.tr) ? cat.nav.tr : cat.id;
    var navEn = (cat.nav && cat.nav.en) ? cat.nav.en : navTr;
    btn.setAttribute('data-i18n', 'text');
    btn.setAttribute('data-i18n-tr', navTr);
    btn.setAttribute('data-i18n-en', navEn);
    btn.textContent = navTr;
    mainNav.appendChild(btn);
  });
}

function renderPizzaCTA(data) {
  var ctaTitleEl = document.getElementById('pizzaCTATitle');
  var ctaSubEl   = document.getElementById('pizzaCTASub');
  if (!data.pizzaCta) return;
  /* ctaTitleEl içinde <em> gibi markup olabilir — allergen-body gibi innerHTML ile güncellenir */
  if (ctaTitleEl) {
    ctaTitleEl.setAttribute('data-i18n', 'html');
    ctaTitleEl.setAttribute('data-i18n-tr', data.pizzaCta.title.tr || '');
    ctaTitleEl.setAttribute('data-i18n-en', data.pizzaCta.title.en || '');
    ctaTitleEl.innerHTML = data.pizzaCta.title.tr || '';
  }
  if (ctaSubEl) {
    ctaSubEl.setAttribute('data-i18n', 'text');
    ctaSubEl.setAttribute('data-i18n-tr', data.pizzaCta.sub.tr || '');
    ctaSubEl.setAttribute('data-i18n-en', data.pizzaCta.sub.en || '');
    ctaSubEl.textContent = data.pizzaCta.sub.tr || '';
  }
}

function renderSections(data) {
  var wrap = document.getElementById('wrap');
  wrap.innerHTML = '';
  accordionIds = [];
  data.categories.forEach(function(cat) {
    var sec = document.createElement('div');
    sec.id        = cat.id;
    sec.className = 'sec';
    if (cat.id === 'pizza') {
      renderPizzaCategory(sec, cat);
    } else {
      renderRegularCategory(sec, cat);
      accordionIds.push(cat.id);
    }
    wrap.appendChild(sec);
  });
}

/* ─────────────────────────────────────────────────────────────────
   ANA RENDER FONKSİYONU — İnce orkestratör
───────────────────────────────────────────────────────────────── */
function renderMenu(data) {
  buildCfgMaps(data);
  renderExtras(data);
  renderNavButtons(data);
  renderPizzaCTA(data);
  renderSections(data);

  var firstId = data.categories[0] ? data.categories[0].id : 'coffee';
  go(firstId);

  requestAnimationFrame(function() {
    initAccordion();
    var pizzaCat = data.categories.filter(function(c) { return c.id === 'pizza'; })[0];
    if (pizzaCat && pizzaCat.builder) {
      initPizzaBuilder(pizzaCat.builder);
      initPizzaPresets();
    }
  });
}

/* ─────────────────────────────────────────────────────────────────
   MENÜ VERİSİ — Inline gömülü, sıfır ağ gecikmesi
───────────────────────────────────────────────────────────────── */

<script src="menu.js"></script>

renderMenu(MENU_DATA);
